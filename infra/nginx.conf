events {
    worker_connections 2048; # Increased for high load
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    access_log /var/log/nginx/access.log main_ext;
    error_log /var/log/nginx/error.log warn;

    # ✅ Anti-DDoS: Zones Definition
    # Limit by IP: 10MB zone can hold ~160,000 IP addresses
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    # ✅ Optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Hide Nginx version

    # ✅ Buffer Limits (Protect against large payload attacks)
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 50M; # Allowed for high-quality media
    large_client_header_buffers 4 8k;

    # ✅ Timeouts (Protect against Slowloris)
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    upstream backend_servers {
        server backend:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # ✅ Strict Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ✅ Gzip Compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # ✅ Authentication Rate Limiting (Brute-force protection)
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ✅ WebSocket & General API
        location / {
            limit_req zone=api_limit burst=30 nodelay;
            limit_conn addr_limit 20; # Max 20 concurrent connections per IP

            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Timeouts for WebSockets
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ✅ Block Malicious Scanners
        location ~* (\.php|wp-admn|admin|config|sql|\.env|\.git) {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Health check
        location /health {
            access_log off;
            return 200 'OK';
        }
    }
}
